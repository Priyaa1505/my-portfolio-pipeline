pipeline {
    agent any

    environment {
        // Change 'your-dockerhub-username' to your actual Docker Hub username
        DOCKER_HUB_USER = 'your-dockerhub-username'
        IMAGE_NAME      = 'my-portfolio'
        PORT            = '8081'
    }

    stages {
        stage('Checkout Code') {
            steps {
                git branch: 'main', url: 'https://github.com/Priyaa1505/my-portfolio-pipeline.git'
            }
        }

        stage('Build Docker Image') {
            steps {
                script {
                    sh "docker build -t ${DOCKER_HUB_USER}/${IMAGE_NAME}:latest ."
                }
            }
        }

        stage('Deploy Application') {
            steps {
                script {
                    // Stop and remove any old running portfolio container if it exists
                    sh "docker stop ${IMAGE_NAME} || true"
                    sh "docker rm ${IMAGE_NAME} || true"
                    
                    // Run the new container on port 8081
                    sh "docker run -d -p ${PORT}:${PORT} --name ${IMAGE_NAME} ${DOCKER_HUB_USER}/${IMAGE_NAME}:latest"
                }
            }
        }
    }

    post {
        success {
            echo "Deployment successful! Portfolio is live on port ${PORT}."
        }
        failure {
            echo "Pipeline failed. Check the console logs above."
        }
    }
}
           
